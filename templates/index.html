<!DOCTYPE html>
<html>
<head>
    <title>Blog</title>
</head>
<body>

<h1>My Blog</h1>

<a href="/add">Add new post</a>

{% for post in posts %}
    <hr>
    <h2>{{ post.title }}</h2>
    <p><strong>Author:</strong> {{ post.author }}</p>
    <p>{{ post.content }}</p>

    <p>Likes: {{ post.likes }}</p>

    <a href="/like/{{ post.id }}">👍 Like</a>
    <a href="/update/{{ post.id }}">Edit</a>
    <a href="/delete/{{ post.id }}">Delete</a>
{% endfor %}

</body>
</html>
